stages:
  - build
  - upload
  - release

variables:
  DEB_FILE_LATEST: "ostserver_latest_amd64.deb"
  DEB_FILE_TAG: "ostserver_${CI_COMMIT_TAG}_amd64.deb"
  PACKAGE_REGISTRY_LATEST: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/latest/latest"
  PACKAGE_REGISTRY_TAG: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_COMMIT_TAG}/${CI_COMMIT_TAG}"


build-job:
  stage: build
  image: ubuntu:24.04
  script:
    - apt-get update
    - apt-get clean
    - apt-get install -y software-properties-common
    - apt-add-repository ppa:mutlaqja/ppa
    - apt-get install -y build-essential cmake git npm qtbase5-dev libqt5websockets5-dev libindi-dev libstellarsolver-dev libnova-dev libgsl-dev wcslib-dev libcfitsio-dev libavahi-client-dev libavahi-common-dev zlib1g-dev dpkg-dev qtdeclarative5-dev libqt5svg5-dev libkf5doctools-dev libkf5config-dev libkf5guiaddons-dev libkf5i18n-dev libkf5newstuff-dev libkf5notifications-dev libkf5xmlgui-dev libkf5plotting-dev libkf5crash-dev libkf5notifyconfig-dev libeigen3-dev libraw-dev libsecret-1-dev debhelper devscripts lintian autotools-dev intltool-debian extra-cmake-modules
    - mkdir media
    - dpkg-buildpackage -us -uc 
    - mv ../ostserver_0.0.0_amd64.deb  ./${DEB_FILE_LATEST}
    - cp ${DEB_FILE_LATEST} ${DEB_FILE_TAG}
    - dpkg -i ${DEB_FILE_LATEST}
    - echo "Quick test..."
    - export QT_QPA_PLATFORM=offscreen
    - ostserver --webroot=media > server.log 2>&1 &
    - SERVER_PID=$!
    - sleep 7
    - ps aux | grep ostserver | grep -v grep
    - node test-ws.js 2>&1 | tee ws.log
    - echo "Server logs:"
    - tail -50 server.log
    - kill $SERVER_PID || true
  artifacts:
    paths:
      - ${DEB_FILE_LATEST}
      - ${DEB_FILE_TAG}
      - server.log
      - ws.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'

upload-job-tag:
  stage: upload
  dependencies:
    - build-job
  image: curlimages/curl:latest
  script:
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${DEB_FILE_TAG} ${PACKAGE_REGISTRY_TAG}/${DEB_FILE_TAG}
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'

upload-job-latest:
  stage: upload
  dependencies:
    - build-job
  image: curlimages/curl:latest
  script:
    - |
      curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/latest"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${DEB_FILE_LATEST} ${PACKAGE_REGISTRY_LATEST}/${DEB_FILE_LATEST}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'

release-job-tag:
  stage: release
  dependencies:
    - upload-job-tag
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"${DEB_FILE_TAG}\",\"url\":\"${PACKAGE_REGISTRY_TAG}/${DEB_FILE_TAG}\"}" 
  rules:
      - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'

release-job-latest:
  stage: release
  dependencies:
    - upload-job-latest
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - |
      release-cli create --name "latest" --tag-name latest \
        --assets-link "{\"name\":\"${DEB_FILE_LATEST}\",\"url\":\"${PACKAGE_REGISTRY_LATEST}/${DEB_FILE_LATEST}\"}" 
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'


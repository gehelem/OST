stages:
  - prepare
  - release

variables:
  # Package version can only contain numbers (0-9), and dots (.).
  # Must be in the format of X.Y.Z, i.e. should match /\A\d+\.\d+\.\d+\z/ regular expresion.
  # See https://docs.gitlab.com/ee/user/packages/generic_packages/#publish-a-package-file

  FIRST_FILE: "testupload1.txt"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/latest/${CI_COMMIT_TAG}"

upload_job:
  stage: prepare
  image: curlimages/curl:latest
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - echo ${CI_COMMIT_TAG} > ${FIRST_FILE}
    - echo "Uploading assets"
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${FIRST_FILE} ${PACKAGE_REGISTRY_URL}/${FIRST_FILE}

release_job:
  stage: release
  dependencies:
    - upload_job
  # tags:
  #   - docker 
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    variables:
      - $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"${FIRST_FILE}\",\"url\":\"${PACKAGE_REGISTRY_URL}/${FIRST_FILE}\"}" 

